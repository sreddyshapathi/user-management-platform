version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: postgres-db

    restart: always

    environment:
      POSTGRES_DB: user_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:

    image: user-management-backend:v1

    container_name: user-backend

    restart: always

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_management

      SPRING_DATASOURCE_USERNAME: postgres

      SPRING_DATASOURCE_PASSWORD: postgres

  frontend:

    image: user-management-frontend:v1

    container_name: user-frontend

    restart: always

    depends_on:
      - backend

    ports:
      - "3000:80"

volumes:

  postgres_data: