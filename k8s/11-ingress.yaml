apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: user-management-ingress
  namespace: user-management

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80